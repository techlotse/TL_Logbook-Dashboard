name: tl-logbook-dashboard

services:
  app:
    image: ${APP_IMAGE:-techlotse/tl-logbook-dashboard:latest}
    build:
      context: ./app
    environment:
      DATA_DIR: /data
      SESSION_TTL_SECONDS: 86400
      MAX_UPLOAD_BYTES: 83886080
    volumes:
      - ./data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    image: nginx:alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8082}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
