name: tl-logbook-dashboard

services:
  app:
    image: ${APP_IMAGE:-techlotse/tl-logbook-dashboard:latest}
    environment:
      DATA_DIR: /data
      SESSION_TTL_SECONDS: 86400
      MAX_UPLOAD_BYTES: 83886080
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m,noexec,nosuid,nodev
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - tl-logbook-dashboard-data:/data
    expose:
      - "8000"
    networks:
      - tl-logbook-dashboard
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    image: nginxinc/nginx-unprivileged:alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8082}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tl-logbook-dashboard
    restart: unless-stopped

networks:
  tl-logbook-dashboard:
    ipam:
      driver: default

volumes:
  tl-logbook-dashboard-data:
