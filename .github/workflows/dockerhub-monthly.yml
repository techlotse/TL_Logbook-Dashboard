name: Container Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "app/**"
      - ".github/workflows/dockerhub-monthly.yml"
  schedule:
    - cron: "23 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: techlotse/tl-logbook-dashboard
  SCAN_TAG: techlotse/tl-logbook-dashboard:security-scan-${{ github.sha }}
  TRIVY_DISABLE_VEX_NOTICE: true

jobs:
  dockerhub:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for security scan
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          pull: true
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ env.SCAN_TAG }}

      - name: Scan repository for vulnerabilities, secrets, and misconfigurations
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan local container image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          pull: true
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
